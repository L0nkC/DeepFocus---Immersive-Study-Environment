<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
    .glass {
      background: rgba(18, 20, 22, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .glass-border {
      border-top: 0.5px solid rgba(174, 206, 190, 0.15);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .timer-shadow {
      text-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body overflow-hidden">
<!-- Immersive Background Container -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-black/40 z-10"></div>
<img alt="Cinematic wide shot of a misty sun-drenched pine forest with soft morning light filtering through deep green canopy" class="w-full h-full object-cover scale-105" data-alt="Cinematic wide shot of a misty sun-drenched pine forest with soft morning light filtering through deep green canopy" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCGKUma_NiB19x9e2LGMcOZyQyL976z2pAlF8QA4dYE9H62pW5R75DxpJnGJnC1qHgxRFfbYhemXxqlRV1XMYXBNhv3lrr7OXIU7t27CgLiIIM_9I73djpmdiOF0HQFlvgtScCEyvKRgpIPF6rRzM13X-QNidd_97p6BuOqSZtMZogh2HN3ng3imFjUpmq-plbjIO_QEAQCiJssQX6fE2PKoHkaZWeF25NPsP92_CWmmTNFktxTfoeNxB-RyJHxvTjXl_73Gh0XLCE"/>
</div>
<!-- TopAppBar Navigation Shell -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-6 w-full bg-gradient-to-b from-black/20 to-transparent">
<div class="text-xl font-bold text-emerald-100 dark:text-emerald-50 tracking-widest uppercase font-manrope">
      DeepFocus
    </div>
<div class="flex gap-6 items-center">
<button class="text-emerald-100/60 hover:text-emerald-300 transition-colors duration-300 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button class="text-emerald-100/60 hover:text-emerald-300 transition-colors duration-300 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- SideNavBar Navigation Shell (Hidden on Focus Mode for minimalism, but structurally mapped from JSON) -->
<nav class="fixed left-0 top-0 hidden md:flex flex-col items-center py-8 h-screen w-20 bg-slate-900/40 backdrop-blur-xl border-r border-white/5 z-40">
<div class="mb-12">
<span class="material-symbols-outlined text-emerald-100 text-3xl" data-icon="spa">spa</span>
</div>
<div class="flex flex-col gap-10">
<div class="text-emerald-300 relative after:content-[''] after:absolute after:right-0 after:h-8 after:w-1 after:bg-emerald-300 after:rounded-l-full flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined" data-icon="spa" style="font-variation-settings: 'FILL' 1;">spa</span>
<span class="text-[10px] font-manrope uppercase tracking-tighter">Sanctuary</span>
</div>
<div class="text-emerald-100/40 hover:bg-white/5 hover:text-emerald-100 transition-all duration-500 flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined" data-icon="insert_chart">insert_chart</span>
<span class="text-[10px] font-manrope uppercase tracking-tighter">Stats</span>
</div>
<div class="text-emerald-100/40 hover:bg-white/5 hover:text-emerald-100 transition-all duration-500 flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="text-[10px] font-manrope uppercase tracking-tighter">Library</span>
</div>
<div class="text-emerald-100/40 hover:bg-white/5 hover:text-emerald-100 transition-all duration-500 flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[10px] font-manrope uppercase tracking-tighter">Profile</span>
</div>
</div>
</nav>
<!-- Main Canvas -->
<main class="relative z-20 h-screen w-full flex flex-col items-center justify-center px-6">
<!-- Focus Timer Card -->
<div class="w-full max-w-2xl glass glass-border rounded-full py-16 px-12 flex flex-col items-center shadow-2xl shadow-black/40">
<div class="flex flex-col items-center w-full">
<!-- Status Header -->
<div class="mb-4 flex items-center gap-3">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="font-headline text-sm tracking-[0.2em] uppercase text-primary/80 font-semibold">Deep Work Session</span>
</div>
<!-- Timer Display -->
<h1 class="font-headline text-[8rem] md:text-[12rem] font-extralight tracking-tighter leading-none text-on-surface timer-shadow">
          25:00
        </h1>
<!-- Progress Bar -->
<div class="w-full max-w-md mt-8">
<div class="h-1 w-full bg-surface-container-highest/30 overflow-hidden">
<div class="h-full bg-primary w-[65%] shadow-[0_0_15px_rgba(174,206,190,0.5)]"></div>
</div>
<div class="flex justify-between mt-3 px-1">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60">Started 09:12</span>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60">65% Complete</span>
</div>
</div>
</div>
</div>
<!-- Floating Controls -->
<div class="mt-12 flex items-center gap-8">
<button class="group flex flex-col items-center gap-2">
<div class="w-16 h-16 rounded-full glass glass-border flex items-center justify-center text-on-surface group-hover:bg-primary/20 group-hover:text-primary transition-all duration-300">
<span class="material-symbols-outlined text-3xl" data-icon="pause">pause</span>
</div>
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface/40 group-hover:text-on-surface transition-colors">Pause</span>
</button>
<button class="group flex flex-col items-center gap-2">
<div class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center text-on-primary shadow-xl shadow-primary/10 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-primary font-bold">Resuming...</span>
</button>
<button class="group flex flex-col items-center gap-2">
<div class="w-16 h-16 rounded-full glass glass-border flex items-center justify-center text-on-surface group-hover:bg-error-container/40 group-hover:text-error transition-all duration-300">
<span class="material-symbols-outlined text-3xl" data-icon="close">close</span>
</div>
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface/40 group-hover:text-on-surface transition-colors">End</span>
</button>
</div>
<!-- Audio Layers Indicator -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 flex gap-4 items-center glass glass-border px-6 py-3 rounded-full">
<div class="flex items-center gap-2 px-3 border-r border-outline-variant/20">
<span class="material-symbols-outlined text-primary text-sm" data-icon="forest" style="font-variation-settings: 'FILL' 1;">forest</span>
<span class="font-label text-xs text-on-surface/80">Forest Rain</span>
</div>
<div class="flex items-center gap-2 px-3 border-r border-outline-variant/20">
<span class="material-symbols-outlined text-primary text-sm" data-icon="waves" style="font-variation-settings: 'FILL' 1;">waves</span>
<span class="font-label text-xs text-on-surface/80">White Noise</span>
</div>
<button class="hover:text-primary transition-colors pl-2">
<span class="material-symbols-outlined text-lg" data-icon="volume_up">volume_up</span>
</button>
</div>
</main>
<!-- Side Stats Panel (Right) -->
<aside class="fixed right-8 top-1/2 -translate-y-1/2 hidden lg:flex flex-col gap-8 z-30">
<div class="glass glass-border p-6 rounded-xl flex flex-col gap-1 items-end">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60">Current Streak</span>
<span class="font-headline text-3xl font-bold text-tertiary">12</span>
<span class="font-label text-[10px] text-on-surface/40 italic">days focused</span>
</div>
<div class="glass glass-border p-6 rounded-xl flex flex-col gap-1 items-end">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60">Today's Goal</span>
<span class="font-headline text-3xl font-bold text-primary">4/6</span>
<span class="font-label text-[10px] text-on-surface/40 italic">sessions completed</span>
</div>
</aside>
</body></html>
